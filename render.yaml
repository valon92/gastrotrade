# Render Blueprint — API Laravel (arontrade.net → Vercel, api.arontrade.net → Render)
# Dokumentacion: docs/MIGRATION_VERCEL_RENDER.md

databases:
  - name: arontrade-db
    plan: starter
    databaseName: arontrade
    user: arontrade

services:
  - type: web
    name: arontrade-api
    runtime: docker
    plan: starter
    region: frankfurt
    branch: main
    dockerfilePath: ./Dockerfile
    healthCheckPath: /up
    autoDeploy: true
    disk:
      name: arontrade-uploads
      mountPath: /var/www/html/public/images/Uploads
      sizeGB: 1
    envVars:
      - key: APP_NAME
        value: Aron Trade
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        value: https://api.arontrade.net
      - key: FRONTEND_URL
        value: https://www.arontrade.net
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: info
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: arontrade-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: arontrade-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: arontrade-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: arontrade-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: arontrade-db
          property: password
      - key: SESSION_DRIVER
        value: database
      - key: SESSION_LIFETIME
        value: "120"
      - key: SESSION_ENCRYPT
        value: "true"
      - key: SESSION_SECURE_COOKIE
        value: "true"
      - key: SESSION_SAME_SITE
        value: lax
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: sync
      - key: FILESYSTEM_DISK
        value: local
      - key: MAIL_MAILER
        value: smtp
      - key: MAIL_HOST
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_FROM_ADDRESS
        sync: false
      - key: MAIL_FROM_NAME
        value: Aron Trade
      - key: OFFICIAL_ORDER_EMAIL
        sync: false
      - key: CACHE_CLEAR_KEY
        generateValue: true
